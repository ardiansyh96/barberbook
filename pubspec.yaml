name: barber_book
description: "BarberBook - Barbershop Reservation App with Customer & Admin roles"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # --- UI ---
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.70.2

  # --- State Management ---
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # --- Firebase ---
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.7
  firebase_storage: ^12.4.5
  firebase_messaging: ^15.2.5

  # --- Routing ---
  go_router: ^14.8.1

  # --- Utils ---
  intl: ^0.20.2
  uuid: ^4.5.3
  logger: ^2.5.0
  shared_preferences: ^2.5.3
  connectivity_plus: ^6.1.4
  image_picker: ^1.1.2

  # --- Notifications ---
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.5
  build_runner: ^2.4.15
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
